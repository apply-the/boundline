name: quality

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  sonar:
    name: SonarCloud & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov clean --workspace
      - run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.workspace.info
      - run: cargo llvm-cov -p boundline-core --lib --all-features --lcov --output-path lcov.boundline-core.info
      - run: cargo llvm-cov -p boundline-adapters --lib --all-features --lcov --output-path lcov.boundline-adapters.info
      - run: cargo llvm-cov -p boundline-cli --lib --all-features --lcov --output-path lcov.boundline-cli.info
      - run: python3 scripts/common/coverage/aggregate_lcov.py --output-lcov lcov.info lcov.workspace.info lcov.boundline-core.info lcov.boundline-adapters.info lcov.boundline-cli.info
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
          verbose: true
