name: release-apt

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  prepare-metadata:
    name: prepare-release-metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
      publish: ${{ steps.extract.outputs.publish }}
    steps:
      - id: extract
        name: Extract release metadata
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          if [[ -z "${version:-}" ]]; then
            echo "Could not extract version from tag '${tag}'." >&2
            exit 1
          fi
          if [[ "${tag}" == *"-"* ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  trigger-apt-publication:
    name: Trigger APT publication
    needs:
      - prepare-metadata
    if: needs.prepare-metadata.outputs.publish == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare-metadata.outputs.version }}
      TAG: ${{ needs.prepare-metadata.outputs.tag }}
    steps:
      - name: Require packages repo token
        shell: bash
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${PACKAGES_REPO_TOKEN:-}" ]]; then
            echo "PACKAGES_REPO_TOKEN is required." >&2
            exit 1
          fi
      - name: Trigger APT publication
        shell: bash
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          amd64_url="https://github.com/apply-the/boundline/releases/download/${TAG}/boundline_${VERSION}_amd64.deb"
          arm64_url="https://github.com/apply-the/boundline/releases/download/${TAG}/boundline_${VERSION}_arm64.deb"

          max_attempts=18
          retry_delay_seconds=10

          check_asset() {
            local label="$1"
            local url="$2"
            local attempt=1

            while (( attempt <= max_attempts )); do
              if curl -fsI "$url" >/dev/null; then
                return 0
              fi

              if (( attempt == max_attempts )); then
                echo "${label} not found at ${url}" >&2
                return 1
              fi

              echo "${label} not available yet; retrying (${attempt}/${max_attempts})..."
              attempt=$(( attempt + 1 ))
              sleep "$retry_delay_seconds"
            done
          }

          check_asset "amd64 Debian package" "$amd64_url"
          check_asset "arm64 Debian package" "$arm64_url"

          payload="$(jq -n \
            --arg package "boundline" \
            --arg version "$VERSION" \
            --arg amd64_url "$amd64_url" \
            --arg arm64_url "$arm64_url" \
            '{
              event_type: "publish-deb",
              client_payload: {
                package: $package,
                version: $version,
                deb_urls: [$amd64_url, $arm64_url]
              }
            }')"
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PACKAGES_REPO_TOKEN}" \
            https://api.github.com/repos/apply-the/packages/dispatches \
            -d "$payload"
