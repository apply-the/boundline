name: Release APT Packages

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

jobs:
  build-deb:
    name: Build Debian Package (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build Debian Package
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          cargo deb --target ${{ matrix.target }}

      - name: Validate and Rename Package
        id: package
        run: |
          DEB_FILE=$(find target -name "boundline_*.deb" | head -n 1)
          if [ -z "$DEB_FILE" ]; then
            echo "Failed to find generated .deb file"
            exit 1
          fi
          
          # Extract version from GitHub ref
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          
          NEW_NAME="boundline_${VERSION}_${{ matrix.arch }}.deb"
          mv "$DEB_FILE" "$NEW_NAME"
          
          # Validation
          echo "Inspecting package: $NEW_NAME"
          dpkg-deb --info "$NEW_NAME"
          dpkg-deb --contents "$NEW_NAME"
          
          if ! dpkg-deb --contents "$NEW_NAME" | grep -q "/usr/bin/boundline"; then
             echo "Binary not found in package at /usr/bin/boundline"
             exit 1
          fi
          echo "deb_file=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.deb_file }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: boundline-deb-${{ matrix.arch }}
          path: ${{ steps.package.outputs.deb_file }}

  publish-packages:
    name: Publish to APT Repository
    needs: build-deb
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: deb-packages

      - name: Checkout Packages Repository
        uses: actions/checkout@v4
        with:
          repository: apply-the/packages
          token: ${{ secrets.PACKAGES_REPO_TOKEN }}
          path: packages-repo

      - name: Publish to APT Repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev

          mkdir -p packages-repo/apt/pool/main/b/boundline/
          find deb-packages -name "*.deb" -exec cp {} packages-repo/apt/pool/main/b/boundline/ \;
          
          cd packages-repo
          ./scripts/rebuild-apt-repo.sh

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apt/pool/main/b/boundline/ apt/dists/
          git commit -m "Publish Boundline APT packages for ${{ github.ref_name }}"
          git push
