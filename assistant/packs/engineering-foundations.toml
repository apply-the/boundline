[guardians.clean-code-safety]
title = "Fail-Fast Shortcut Guardian"
kind = "deterministic"
applies_to = ["verification", "review"]
rules = ["panic_prone_flow"]
severity_floor = "error"
command = "builtin:no-panic-flow"
instruction = "../guardians/clean-code-safety.md"

[guardians.architecture-review]
title = "Architecture Boundary Guardian"
kind = "llm"
applies_to = ["planning", "architecture", "review"]
rules = ["bounded_architecture"]
severity_floor = "concern"
instruction = "../guardians/architecture-review.md"

[guardians.testing-evidence]
title = "Testing Evidence Guardian"
kind = "hybrid"
applies_to = ["verification"]
rules = ["verification_evidence"]
severity_floor = "warn"
command = "builtin:validation-evidence"
instruction = "../guardians/testing-evidence.md"

[guardians.security-boundary-review]
title = "Security Boundary Guardian"
kind = "llm"
applies_to = ["implementation", "verification", "review"]
rules = ["security_boundaries"]
severity_floor = "warn"
instruction = "../guardians/security-boundary-review.md"
