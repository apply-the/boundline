applies_to = ["planning", "implementation", "verification", "review"]
roles = ["planner", "implementer", "reviewer"]
path = "../guidance-catalog/guidance/clean-code.md"
priority = "high"

[guidance.architecture]
title = "Architecture Guidance"
applies_to = ["planning", "architecture", "review"]
roles = ["planner", "architect", "reviewer"]
path = "../guidance-catalog/guidance/architecture.md"
priority = "medium"

[guidance.security-boundaries]
title = "Security And Boundary Guidance"
applies_to = ["planning", "implementation", "verification", "review"]
roles = ["planner", "implementer", "verifier", "reviewer"]
path = "../guidance-catalog/guidance/security-boundaries.md"
priority = "high"

[guidance.language-best-practices]
title = "Cross-Language Engineering Guidance"
applies_to = ["planning", "implementation", "verification", "review"]
roles = ["planner", "implementer", "verifier", "reviewer"]
path = "../guidance-catalog/guidance/language-core.md"
priority = "medium"

[guidance.testing-best-practices]
title = "Cross-Framework Testing Strategy"
applies_to = ["planning", "testing", "verification", "review"]
roles = ["planner", "verifier", "reviewer"]
path = "../guidance-catalog/guidance/testing-core.md"
priority = "high"

[guardians.clean-code-safety]
title = "Clean Code Guardian"
kind = "llm"
applies_to = ["verification", "review"]
rules = ["intent_revealing_names", "no_mixed_responsibilities", "no_hidden_side_effects"]
severity_floor = "warn"
command = "builtin:clean-code"
instruction = "../guidance-catalog/guardians/clean-code.md"

[guardians.architecture-review]
title = "Architecture Boundary Guardian"
kind = "llm"
applies_to = ["planning", "architecture", "review"]
rules = ["bounded_architecture"]
severity_floor = "concern"
instruction = "../guidance-catalog/guardians/architecture-boundary.md"

[guardians.testing-evidence]
title = "Testing Evidence Guardian"
kind = "hybrid"
applies_to = ["verification"]
rules = ["verification_evidence"]
severity_floor = "warn"
command = "builtin:validation-evidence"
instruction = "../guidance-catalog/guardians/testability.md"

[guardians.security-boundary-review]
title = "Security Boundary Guardian"
kind = "llm"
applies_to = ["implementation", "verification", "review"]
rules = ["security_boundaries"]
severity_floor = "warn"
instruction = "../guidance-catalog/guardians/security-boundary.md"
