# Guardian Index
# This index maps guardian IDs to pillars, lifecycle phases, candidate kinds, and rule groups.

[guardian.clean_code]
pillar = "clean-code"
kind = "llm"
rules = ["intent-revealing-names", "no-mixed-responsibilities", "no-hidden-side-effects", "no-primitive-obsession", "no-dead-code", "no-magic-values", "small-functions", "comments-explain-why", "no-wildcard-imports"]
applies_to = ["implementation", "review", "refactor"]
default_disposition = "concern"

[guardian.architecture_boundary]
pillar = "architecture"
kind = "hybrid"
rules = ["dependency-direction", "data-ownership-boundary", "public-contract-stability"]
applies_to = ["architecture", "implementation", "review", "migration"]
default_disposition = "warning"

[guardian.testability]
pillar = "testing"
kind = "hybrid"
rules = ["untestable-design", "missing-safety-net", "brittle-mocks"]
applies_to = ["planning", "implementation", "testing", "review", "refactor"]
default_disposition = "concern"

[guardian.rust_zero_panic]
pillar = "language"
language = "rust"
kind = "deterministic"
rules = ["no-unwrap-in-domain-code", "no-expect-in-library-code", "no-panic-in-production-path"]
applies_to = ["implementation", "review"]
default_disposition = "warning"

[guardian.rust_idiomatic]
pillar = "language"
language = "rust"
kind = "hybrid"
rules = ["prefer-channels-over-locks", "no-wildcard-imports"]
applies_to = ["implementation", "review"]
default_disposition = "concern"

[guardian.ts_runtime_validation]
pillar = "language"
language = "typescript"
kind = "hybrid"
rules = ["unchecked-external-json", "any-at-boundary", "duplicated-schema-and-type"]
applies_to = ["implementation", "review"]
default_disposition = "concern"

[guardian.observability]
pillar = "observability"
kind = "hybrid"
rules = ["external-call-without-telemetry", "missing-correlation-id", "unstructured-log", "no-secrets-in-logs"]
applies_to = ["implementation", "review", "incident"]
default_disposition = "concern"

[guardian.retry_safety]
pillar = "resilience"
kind = "hybrid"
rules = ["retry-without-idempotency", "infinite-retry", "retry-without-backoff"]
applies_to = ["architecture", "implementation", "review", "migration"]
default_disposition = "warning"

[guardian.supply_chain]
pillar = "supply-chain"
kind = "hybrid"
rules = ["dependency-manifest-without-lockfile-update", "license-unknown", "vulnerability-untriaged"]
applies_to = ["implementation", "review", "supply-chain-analysis"]
default_disposition = "warning"

[guardian.security_boundary]
pillar = "security"
kind = "hybrid"
rules = ["sql-injection-risk", "command-injection-risk", "secret-in-source"]
applies_to = ["implementation", "review", "verification"]
default_disposition = "warning"

[guardian.operations_readiness]
pillar = "operations-readiness"
kind = "hybrid"
rules = ["missing-health-endpoint", "missing-graceful-shutdown", "deployment-without-rollback"]
applies_to = ["architecture", "implementation", "review", "verification"]
default_disposition = "concern"

[guardian.python_type_safety]
pillar = "language"
language = "python"
kind = "hybrid"
rules = ["missing-type-hints", "untyped-boundary-function", "bare-except"]
applies_to = ["implementation", "review"]
default_disposition = "concern"

[guardian.go_error_handling]
pillar = "language"
language = "go"
kind = "hybrid"
rules = ["unchecked-error-return", "error-string-comparison", "panic-in-library"]
applies_to = ["implementation", "review"]
default_disposition = "warning"

[guardian.api_contract_stability]
pillar = "api-contracts"
kind = "hybrid"
rules = ["breaking-field-removal", "missing-versioning", "inconsistent-error-shape"]
applies_to = ["architecture", "implementation", "review"]
default_disposition = "warning"

[guardian.migration_safety]
pillar = "migration"
kind = "hybrid"
rules = ["destructive-migration-without-rollback", "schema-lock-duration", "missing-backfill-validation"]
applies_to = ["implementation", "review", "migration"]
default_disposition = "warning"

[guardian.concurrency_safety]
pillar = "resilience"
kind = "hybrid"
rules = ["shared-mutable-state-without-sync", "blocking-in-async-context", "missing-cancellation-handling", "prefer-message-passing"]
applies_to = ["architecture", "implementation", "review"]
default_disposition = "concern"

[guardian.data_validation]
pillar = "security"
kind = "deterministic"
rules = ["unvalidated-external-input", "missing-schema-at-boundary", "log-contains-pii"]
applies_to = ["implementation", "review", "verification"]
default_disposition = "warning"

[guardian.rust_strict_io]
pillar = "language"
language = "rust"
kind = "hybrid"
rules = ["no-println-in-core"]
applies_to = ["implementation", "review"]
default_disposition = "warning"
