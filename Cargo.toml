[workspace]
members = [
	".",
	"crates/boundline-core",
	"crates/boundline-adapters",
	"crates/boundline-cli",
]
resolver = "3"

[workspace.package]
version = "0.51.1"
edition = "2024"
license = "MIT"

[workspace.dependencies]
clap = { version = "4", features = ["derive"] }
dialoguer = "0.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
uuid = { version = "1", features = ["serde", "v4"] }
toml = "0.8"
boundline-core = { path = "crates/boundline-core" }
boundline-adapters = { path = "crates/boundline-adapters" }
boundline-cli = { path = "crates/boundline-cli" }

[package]
name = "boundline"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
boundline-core.workspace = true
boundline-adapters.workspace = true
boundline-cli.workspace = true
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
uuid.workspace = true
toml.workspace = true
