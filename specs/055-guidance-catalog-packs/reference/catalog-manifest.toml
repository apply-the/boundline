# Boundline Guidance Catalog Manifest
# Phase 7 integration manifest

[catalog]
id = "boundline-guidance-catalog"
version = "0.1.0"
kind = "guidance-catalog"
status = "draft"
description = "Pack-ready guidance and guardian rule catalog for Boundline S2.1."

[compatibility]
boundline = ">=0.55"
canon_contract = ">=0.50"

[authority]
default_source = "shared-pack"
default_strength = "recommended"
canon_promotable = true
workspace_override_allowed = true

[layout]
guidance_dir = "guidance"
guardians_dir = "guardians"
schemas_dir = "schemas"
examples_dir = "examples"

[pillars]
included = [
  "clean-code",
  "architecture",
  "testing",
  "language",
  "framework",
  "security",
  "domain-language",
  "domain-modeling",
  "api-contracts",
  "migration",
  "observability",
  "resilience",
  "operations-readiness",
  "supply-chain",
  "data-ai",
  "optional-ecosystem"
]

[runtime]
requires_s2_1 = true
requires_s3 = false
requires_s4 = false

[trace]
record_resolution = true
record_authority_source = true
record_guidance_strength = true
record_guardian_findings = true
